<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Special Surprise For Aaru 💖</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ffd6e7,#fff0f5);
overflow:hidden;
}

#welcome{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

#main{
display:none;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

h1{
color:#ff4f8b;
font-size:42px;
margin-bottom:15px;
}

p{
font-size:18px;
color:#555;
}

button{
margin-top:25px;
padding:15px 35px;
border:none;
border-radius:30px;
background:#ff4f8b;
color:white;
font-size:18px;
cursor:pointer;
}

.heart{
position:fixed;
bottom:-50px;
font-size:25px;
animation:float 8s linear forwards;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}
</style>
</head>

<body>

<div id="welcome">
<h1>A Special Surprise For Aaru 💖</h1>
<p>Tap below to enter your birthday surprise ✨</p>
<button onclick="enterSite()">Enter ✨</button>
</div>

<div id="main">
<h1>🎂 Happy Birthday Aaru 💖</h1>
<p>You are one of the most special people in my life. ✨</p>
</div>

<script>
function enterSite(){
document.getElementById("welcome").style.display="none";
document.getElementById("main").style.display="flex";
}

setInterval(function(){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
document.body.appendChild(heart);

setTimeout(function(){
heart.remove();
},8000);

},500);
</script>

</body>
</html>
