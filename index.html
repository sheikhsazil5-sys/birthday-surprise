<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aaru 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#fff5f7,#ffe4ec,#ffd6e7);
overflow:hidden;
text-align:center;
}

.container{
padding:20px;
}

h1{
font-family:'Great Vibes',cursive;
font-size:90px;
color:#ff4f8b;
text-shadow:0 0 20px rgba(255,79,139,.3);
}

p{
margin-top:15px;
font-size:18px;
color:#666;
}

.btn{
display:inline-block;
margin-top:35px;
padding:15px 40px;
border-radius:50px;
background:#ff4f8b;
color:white;
text-decoration:none;
font-size:18px;
box-shadow:0 10px 25px rgba(255,79,139,.3);
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

.heart{
position:fixed;
bottom:-50px;
font-size:24px;
animation:float 8s linear forwards;
pointer-events:none;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<h1>Aaru 💖</h1>

<p>
A special surprise made just for you ✨
</p>

<a class="btn" href="letter.html">
Open Your Surprise 🎁
</a>

</div>

<script>

setInterval(function(){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(function(){
heart.remove();
},8000);

},500);

</script>

</body>
</html>
