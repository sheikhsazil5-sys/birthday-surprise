<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aaru 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#fff5f7,#ffe4ec,#ffd6e7);
}

.container{
text-align:center;
padding:20px;
z-index:2;
}

h1{
font-family:'Great Vibes',cursive;
font-size:110px;
color:#ff4f8b;
text-shadow:0 0 25px rgba(255,79,139,.35);
}

.subtitle{
margin-top:10px;
font-size:20px;
color:#666;
}

.btn{
display:inline-block;
margin-top:35px;
padding:16px 42px;
background:#ff4f8b;
color:white;
text-decoration:none;
border-radius:50px;
font-size:18px;
font-weight:600;
box-shadow:0 10px 25px rgba(255,79,139,.3);
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

.heart{
position:fixed;
bottom:-50px;
font-size:24px;
animation:float 8s linear forwards;
pointer-events:none;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

.glow{
position:absolute;
width:300px;
height:300px;
background:rgba(255,79,139,.15);
border-radius:50%;
filter:blur(80px);
}

.glow1{
top:-100px;
left:-100px;
}

.glow2{
bottom:-100px;
right:-100px;
}

</style>
</head>

<body>

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="container">

<h1>𝓐aru 💖</h1>

<p class="subtitle">
A special surprise made just for you ✨
</p>

<a href="letter.html" class="btn">
Open Your Surprise 🎁
</a>

</div>

<script>

setInterval(function(){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(function(){
heart.remove();
},8000);

},600);

</script>

</body>
</html>
