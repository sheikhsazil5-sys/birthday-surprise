<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aaru 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Tangerine:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(135deg,#fff5f7,#ffe4ec,#ffd6e7);
font-family:'Poppins',sans-serif;
position:relative;
}

/* Background Glow */

.glow{
position:absolute;
width:350px;
height:350px;
border-radius:50%;
background:rgba(255,105,180,.15);
filter:blur(90px);
}

.glow1{
top:-120px;
left:-120px;
}

.glow2{
bottom:-120px;
right:-120px;
}

/* Main Content */

.container{
text-align:center;
z-index:2;
padding:20px;
}

.name{
font-family:'Tangerine',cursive;
font-size:150px;
color:#111;
text-shadow:2px 2px 12px rgba(0,0,0,.12);
animation:fadeUp 1.5s ease;
}

.subtitle{
font-size:20px;
color:#666;
margin-top:-10px;
animation:fadeUp 2s ease;
}

.btn{
display:inline-block;
margin-top:35px;
padding:16px 42px;
background:#ff4f8b;
color:white;
text-decoration:none;
border-radius:50px;
font-size:18px;
font-weight:600;
box-shadow:0 10px 25px rgba(255,79,139,.35);
transition:.3s;
animation:fadeUp 2.5s ease;
}

.btn:hover{
transform:scale(1.05);
}

/* Floating Hearts */

.heart{
position:fixed;
bottom:-50px;
font-size:24px;
animation:float 8s linear forwards;
pointer-events:none;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

/* Fade Animation */

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

  <audio id="bgMusic"></audio>
  
</button>
<script>
const songs = [
  "song.mp3",
  "song2.mp3"
];

let currentSong = 0;
const player = document.getElementById("bgMusic");

player.src = songs[currentSong];

document.addEventListener("click", function () {
  player.play();
}, { once: true });

player.addEventListener("ended", function () {
  currentSong = (currentSong + 1) % songs.length;

  player.src = songs[currentSong];
  player.play();
});
</script>

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="container">

<div class="name">
Aaru
</div>

<div class="subtitle">
A special surprise made just for you 💖
</div>

<a href="letter.html" class="btn" onclick="document.getElementById('bgMusic').play()">
Open Your Surprise 🎁
</a>

</div>

<script>

setInterval(function(){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(function(){
heart.remove();
},8000);

},600);

</script>

</body>
</html>
