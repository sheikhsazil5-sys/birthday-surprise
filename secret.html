<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Final Surprise 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Tangerine:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#fff5f7,#ffe4ec,#ffd6e7);
overflow-x:hidden;
padding:30px 20px;
}

.container{
max-width:900px;
margin:auto;
text-align:center;
}

.title{
font-family:'Tangerine',cursive;
font-size:120px;
color:#111;
margin-bottom:10px;
animation:fadeDown 1.5s ease;
}

.subtitle{
font-size:20px;
color:#555;
margin-bottom:40px;
animation:fadeDown 2s ease;
}

.message{
font-size:24px;
line-height:2;
color:#222;
white-space:pre-wrap;
text-align:left;
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.signature{
text-align:center;
margin-top:40px;
font-size:32px;
font-weight:600;
color:#ff4f8b;
animation:glow 2s infinite alternate;
}

.heart{
position:fixed;
bottom:-50px;
font-size:25px;
animation:float 8s linear forwards;
pointer-events:none;
}

@keyframes fadeDown{
from{
opacity:0;
transform:translateY(-30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes glow{
from{
opacity:.7;
}
to{
opacity:1;
text-shadow:0 0 15px rgba(255,79,139,.5);
}
}

@keyframes float{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<div class="title">Aaru 💖</div>

<div class="subtitle">
One Last Message For You ✨
</div>

<div class="message" id="typewriter"></div>

<div class="signature">
Happy Birthday Aaru 🎂💖
</div>

</div>

<script>

const text = `Aaru,

Agar tum yahan tak pahunch gayi ho, toh shayad tumne is chhote se surprise ka har page dekh liya hoga. ✨

Sach kahun toh ye sirf ek website nahi hai. Ye un chhoti chhoti memories, smiles aur moments ka collection hai jo mere liye kaafi special hain.

Jab maine ye banana start kiya tha, tab sirf ek hi thought tha — ki tumhare birthday par kuch aisa doon jo sirf ek gift na ho, balki ek memory ban jaye. 🌸

Kabhi kabhi kuch log hamari life me aate hain aur bina realize kiye usse thoda aur accha bana dete hain. Tum unhi logon me se ek ho.

Tumhari smile, tumhari kindness aur tumhara way of being yourself... ye sab cheezein tumhe alag banati hain. Aur shayad isi liye tum itni special ho. 💖

Aaj tumhara birthday hai aur dil se bas itna kehna tha ki main hope karta hu ki tumhari life me hamesha khushiyan rahein, tumhare sapne poore hon aur tumhe hamesha wo sab mile jo tum deserve karti ho.

Shayad waqt ke saath bahut si cheezein badal jayengi, lekin kuch memories aur kuch log hamesha special rehte hain. Aur tum unme se ek ho.

Thank you for being a part of these memories.

Aur haan... aaj ka din sirf tumhara hai. Toh khul ke hasna, enjoy karna aur bahut saari photos lena. 📸✨

Happy Birthday Aaru. 🎂💖

You are truly special.`;
let i = 0;

function typeWriter(){

if(i < text.length){

document.getElementById("typewriter").innerHTML += text.charAt(i);

i++;

setTimeout(typeWriter,40);

}

}

typeWriter();

setInterval(function(){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(function(){
heart.remove();
},8000);

},500);

</script>

</body>
</html>
