<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Final Surprise 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Tangerine:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#fff5f7,#ffe4ec,#ffd6e7);
overflow-x:hidden;
padding:30px 20px;
}

.container{
max-width:900px;
margin:auto;
text-align:center;
}

.title{
font-family:'Tangerine',cursive;
font-size:120px;
color:#111;
margin-bottom:10px;
}

.heart-big{
font-size:140px;
margin:20px 0;
}

.subtitle{
font-size:22px;
color:#555;
margin-bottom:30px;
}

.message{
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
font-size:22px;
line-height:1.9;
color:#222;
text-align:left;
white-space:pre-wrap;
min-height:250px;
}

.signature{
margin-top:40px;
font-size:42px;
font-weight:700;
color:#ff4f8b;
text-align:center;
}

.floating-heart{
position:fixed;
bottom:-50px;
font-size:24px;
animation:float 8s linear forwards;
pointer-events:none;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

</style>
</head>

<body>

    <audio id="bgMusic"></audio>

<script>
const songs = [
  "song.mp3",
  "song2.mp3"
];

let currentSong = 0;
const player = document.getElementById("bgMusic");

player.src = songs[currentSong];

document.addEventListener("click", function () {
  player.play();
}, { once: true });

player.addEventListener("ended", function () {
  currentSong = (currentSong + 1) % songs.length;
  player.src = songs[currentSong];
  player.play();
});
</script>

<div class="container">

<h1 class="title">Aaru</h1>

<div class="heart-big">💖</div>

<div class="subtitle">
One Last Message For You ✨
</div>

<div class="message" id="typewriter"></div>

<div class="signature">
Happy Birthday Aaru 🎂💖
</div>

</div>

<script>

const text = `Aaru,

Agar tum yahan tak pahunch gayi ho, toh shayad tumne is chhote se surprise ka har page dekh liya hoga. ✨

Sach kahun toh ye sirf ek website nahi hai.

Ye un chhoti chhoti memories, smiles aur moments ka collection hai jo mere liye kaafi special hain.

Jab maine ye banana start kiya tha, tab sirf ek hi thought tha...

Ki tumhare birthday par kuch aisa doon jo sirf ek gift na ho, balki ek memory ban jaye. 🌸

Kabhi kabhi kuch log hamari life me aate hain aur bina realize kiye usse thoda aur accha bana dete hain.

Tum unhi logon me se ek ho.

Tumhari smile, tumhari kindness aur tumhara way of being yourself... ye sab cheezein tumhe alag banati hain.

Aur shayad isi liye tum itni special ho. 💖

Aaj tumhara birthday hai.

Aur dil se bas itna kehna tha ki main hope karta hu ki tumhari life me hamesha khushiyan rahein.

Tumhare sapne poore hon.

Tumhe hamesha wo sab mile jo tum deserve karti ho.

Aur sabse zaroori...

Tum hamesha isi tarah smile karti raho. ✨

Shayad waqt ke saath bahut si cheezein badal jayengi.

Lekin kuch memories aur kuch log hamesha special rehte hain.

Aur tum unme se ek ho.

Thank you for being a part of these memories.

Aur haan...

Aaj ka din sirf tumhara hai.

Toh khul ke hasna.

Enjoy karna.

Bahut saari photos lena. 📸

Aur ek baar phir se...

Happy Birthday Aaru. 🎂💖

You are truly special.

And no matter how many birthdays come and go...

I hope this one always makes you smile. 💖✨`;

let i = 0;

function typeWriter() {
    if (i < text.length) {
        document.getElementById("typewriter").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 35);
    }
}

typeWriter();

setInterval(function(){

let heart=document.createElement("div");

heart.className="floating-heart";

heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(function(){
heart.remove();
},8000);

},600);

</script>

</body>
</html>
