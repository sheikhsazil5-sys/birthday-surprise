<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Final Surprise 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Tangerine:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#fff5f7,#ffe4ec,#ffd6e7);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
padding:20px;
text-align:center;
}

.container{
max-width:900px;
animation:fadeIn 2s ease;
}

.title{
font-family:'Tangerine',cursive;
font-size:120px;
color:#111;
margin-bottom:20px;
}

.message{
font-size:24px;
line-height:2;
color:#222;
min-height:250px;
}

.signature{
margin-top:40px;
font-size:28px;
font-weight:600;
color:#ff4f8b;
opacity:0;
animation:show 2s forwards;
animation-delay:10s;
}

.heart{
position:fixed;
bottom:-50px;
font-size:24px;
animation:float 8s linear forwards;
pointer-events:none;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes show{
to{
opacity:1;
}
}

@keyframes float{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<div class="title">
Aaru 💖
</div>

<div class="message" id="typewriter"></div>

<div class="signature">
Made Especially For Aaru 💖✨
</div>

</div>

<script>

const text = `This wasn't just a birthday surprise...

It was a collection of memories, smiles, laughter and moments that mean a lot.

Thank you for being such a wonderful person.

May your life always be filled with happiness, success and beautiful memories.

Never stop smiling.

✨ Happy Birthday Aaru ✨`;

let i = 0;

function typeWriter(){

if(i < text.length){

document.getElementById("typewriter").innerHTML += text.charAt(i);

i++;

setTimeout(typeWriter,50);

}

}

typeWriter();

setInterval(function(){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(function(){
heart.remove();
},8000);

},500);

</script>

</body>
</html>
